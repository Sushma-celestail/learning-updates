<!--Create a student marks table with <thead>, <tbody>, <tfoot> (for totals), and a <caption>. -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
table {
  width: 60%;
  border-collapse:collapse;
  margin: 50px auto;
}
th, td {
  border: 1px solid black;
  padding: 20px;
  text-align: center;
}

caption {
  font-size: 20px;
  font-weight: bold;
  margin-bottom: 10px;
}
</style>
</head>
<body>
<table>
  <caption>Student Marks Report</caption>

  <thead>
    <tr>
      <th scope="col">Name</th>
      <th scope="col">Math</th>
      <th scope="col">Science</th>
      <th scope="col">English</th>
      <th scope="col">Total</th>
    </tr>
  </thead>

  <tbody>
    <tr>
      <td>Sushma</td>
      <td>85</td>
      <td>90</td>
      <td>88</td>
      <td>263</td>
    </tr>
    <tr>
      <td>Rahul</td>
      <td>78</td>
      <td>82</td>
      <td>80</td>
      <td>240</td>
    </tr>
  </tbody>

  <tfoot>
    <tr>
      <td><strong>Total</strong></td>
      <td>163</td>
      <td>172</td>
      <td>168</td>
      <td>503</td>
    </tr>
  </tfoot>

</table>
</body>
</html>
