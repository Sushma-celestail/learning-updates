<!--  1. Box Sizing Demo (content-box vs border-box) -->

<!DOCTYPE html>
<html>
<head>
  <style>
    .box {
      width: 200px;
      padding: 20px;
      border: 5px solid black;
      margin: 10px;
      background-color: lightblue;
    }

    .content-box {
      box-sizing: content-box;
    }

    .border-box {
      box-sizing: border-box;
    }
  </style>
</head>
<body>

<h2>Box Sizing</h2>

<div class="box content-box">
  content-box (grows bigger)
</div>

<div class="box border-box">
  border-box (fixed size)
</div>

</body>
</html>
