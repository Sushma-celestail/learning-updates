<!-- 2. Margin Collapse + Prevention-->
 <!DOCTYPE html>
<html>
<head>
  <style>
    .para1 {
      margin-bottom: 30px;
      background: lightcoral;
    }

    .para2 {
      margin-top: 30px;
      background: lightgreen;
    }

    /* Prevent collapse */
    .wrapper {
      padding-top: 1px;
    }
  </style>
</head>
<body>

<h2>Margin Collapse</h2>

<p class="para1">Paragraph 1</p>
<p class="para2">Paragraph 2 (collapsed margin)</p>

<h2>Prevent Collapse</h2>

<div class="wrapper">
  <p class="para1">Paragraph 1</p>
  <p class="para2">Paragraph 2 (no collapse)</p>
</div>

</body>
</html>
