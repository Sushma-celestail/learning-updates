<!DOCTYPE html>
<html>
<head>
<style>
button {
  padding: 12px 25px;
  background-color: teal;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;

  transition: all 0.3s ease;
}

/* Hover */
button:hover {
  background-color: darkcyan;
  box-shadow: 0 5px 15px rgba(0,0,0,0.3);
}

/* Focus (keyboard users) */
button:focus {
  outline: none;
  box-shadow: 0 0 0 3px rgba(0,128,128,0.5);
}
</style>
</head>
<body>

<button>Click Me</button>

</body>
</html>
