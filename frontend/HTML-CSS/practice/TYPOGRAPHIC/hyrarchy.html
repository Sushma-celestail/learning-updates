<!DOCTYPE html>
<html>
<head>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Playfair+Display&display=swap" rel="stylesheet">
<style>
body {
  font-family: 'Poppins', sans-serif;
  line-height: 1.6;
  color: #333;
  padding: 20px;
}

/* Headings */
h1, h2, h3 {
  font-family: 'Playfair Display', serif;
  margin-bottom: 10px;
}

h1 { font-size: 36px; }
h2 { font-size: 28px; }
h3 { font-size: 22px; }

/* Body */
p {
  font-size: 16px;
  margin-bottom: 10px;
}

/* Caption */
.caption {
  font-size: 12px;
  color: #777;
}

/* Blockquote */
blockquote {
  font-style: italic;
  border-left: 4px solid teal;
  padding-left: 15px;
  margin: 15px 0;
  color: #555;
}
</style>
</head>
<body>

<h1>Main Heading</h1>
<p>Body text goes here.</p>
<p class="caption">This is a caption</p>

<blockquote>
  This is a styled quote for emphasis.
</blockquote>

</body>
</html>
