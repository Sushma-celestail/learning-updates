<!DOCTYPE html>
<html>
<head>
<style>
.card {
  width: 300px;
  height: 200px;
  border-radius: 15px;
  overflow: hidden;
  position: relative;
  box-shadow: 0 10px 20px rgba(0,0,0,0.2);
  background: url('https://picsum.photos/400') center/cover no-repeat;
}

/* Overlay */
.card::before {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.4);
}

/* Text */
.card-content {
  position: relative;
  color: white;
  padding: 20px;
  z-index: 1;
}
</style>
</head>
<body>

<div class="card">
  <div class="card-content">
    <h2>Card Title</h2>
    <p>Description here</p>
  </div>
</div>

</body>
</html>
