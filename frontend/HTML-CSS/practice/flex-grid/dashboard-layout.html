<!DOCTYPE html>
<html>
<head>
<style>
.dashboard {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  grid-auto-rows: 100px;
  gap: 10px;
}

.widget {
  background: teal;
  color: white;
  padding: 20px;
}

/* Different spans */
.wide { grid-column: span 2; }
.tall { grid-row: span 2; }
.big  { grid-column: span 2; grid-row: span 2; }
</style>
</head>
<body>

<div class="dashboard">
  <div class="widget">1</div>
  <div class="widget wide">2</div>
  <div class="widget">3</div>

  <div class="widget tall">4</div>
  <div class="widget">5</div>
  <div class="widget">6</div>

  <div class="widget big">7</div>
  <div class="widget">8</div>
</div>

</body>
</html>
