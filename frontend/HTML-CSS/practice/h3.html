<!--3. Card Component-->
<!DOCTYPE html>
<html>
<head>
  <style>
    .card {
      width: 300px;
      padding: 20px;
      margin: 20px auto;
      border: 1px solid #ccc;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
      background: white;
      text-align: center;
    }

    .card button {
      padding: 10px 15px;
      border: none;
      background: blue;
      color: white;
      cursor: pointer;
    }
  </style>
</head>
<body>

<h2>Card</h2>

<div class="card">
  <h3>Card Title</h3>
  <p>This is a simple card.</p>
  <button>Read More</button>
</div>

</body>
</html>
