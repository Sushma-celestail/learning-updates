<!--Build a pricing table with 3 columns using Flexbox where all columns are equal height.-->

<!DOCTYPE html>
<html>
<head>
<style>
.pricing {
  display: flex;
  gap: 20px;
}

.plan {
  flex: 1;
  background: #f4f4f4;
  padding: 20px;
  text-align: center;
  display: flex;
  flex-direction: column;
}

.plan button {
  margin-top: auto; /* pushes button to bottom */
}
</style>
</head>
<body>

<div class="pricing">
  <div class="plan">
    <h2>Basic</h2>
    <p>₹199/month</p>
    <p>Feature 1</p>
    <p>Feature 2</p>
    <button>Buy</button>
  </div>

  <div class="plan">
    <h2>Standard</h2>
    <p>₹399/month</p>
    <p>Feature 1</p>
    <p>Feature 2</p>
    <p>Feature 3</p>
    <button>Buy</button>
  </div>

  <div class="plan">
    <h2>Premium</h2>
    <p>₹699/month</p>
    <p>All Features</p>
    <button>Buy</button>
  </div>
</div>

</body>
</html>
