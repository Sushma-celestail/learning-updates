<!DOCTYPE html>
<html>
<head>
<style>
.card {
  width: 250px;
  padding: 20px;
  background: #f4f4f4;
  border-radius: 12px;
  box-shadow: 0 5px 10px rgba(0,0,0,0.2);

  transition: all 0.3s ease;
}

/* Hover lift */
.card:hover {
  transform: translateY(-10px);
  box-shadow: 0 15px 30px rgba(0,0,0,0.3);
}
</style>
</head>
<body>

<div class="card">
  <h3>Card Title</h3>
  <p>Hover to lift</p>
</div>

</body>
</html>
