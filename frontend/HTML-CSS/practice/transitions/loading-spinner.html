<!DOCTYPE html>
<html>
<head>
<style>
.loader {
  width: 50px;
  height: 50px;
  border: 5px solid #ddd;
  border-top: 5px solid teal;
  border-radius: 50%;

  animation: spin 1s linear infinite;
}

/* Animation */
@keyframes spin {
  from { transform: rotate(0deg); }
  to   { transform: rotate(360deg); }
}
</style>
</head>
<body>

<div class="loader"></div>

</body>
</html>
