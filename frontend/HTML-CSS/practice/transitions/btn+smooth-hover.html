<!DOCTYPE html>
<html>
<head>
<style>
button {
  padding: 12px 25px;
  background-color: teal;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;

  transition: all 0.3s ease;
}

/* Hover animation */
button:hover {
  background-color: darkcyan;
  transform: scale(1.05);
  box-shadow: 0 8px 20px rgba(0,0,0,0.3);
}
</style>
</head>
<body>

<button>Hover Me</button>

</body>
</html>
