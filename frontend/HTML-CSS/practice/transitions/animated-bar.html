<!DOCTYPE html>
<html>
<head>
<style>
.progress-container {
  width: 300px;
  height: 20px;
  background: #ddd;
  border-radius: 10px;
  overflow: hidden;
}

.progress-bar {
  height: 100%;
  background: teal;
  width: 0;

  animation: load 3s forwards;
}

/* Animation */
@keyframes load {
  from { width: 0%; }
  to   { width: 100%; }
}
</style>
</head>
<body>

<div class="progress-container">
  <div class="progress-bar"></div>
</div>

</body>
</html>
