<!--4. Contact Form (Advanced Validation)-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>Contact Form</h2>

<form>
  <!-- Name -->
  <label>Name:</label>
  <input type="text" name="name" required><br><br>

  <!-- Email -->
  <label>Email:</label>
  <input type="email" name="email" required><br><br>

  <!-- Phone -->
  <label>Phone:</label>
  <input type="tel" name="phone" pattern="[0-9]{10}" required placeholder="10-digit number"><br><br>

  <!-- Message -->
  <label>Message:</label><br>
  <textarea name="message" required minlength="10"></textarea><br><br>

  <button type="submit">Send</button>
</form>

</body>
</html>
</body>
</html>
