<!--Create a navigation bar with links to Home, About, Services, and Contact sections using anchor tags with fragment identifiers (#). 
 -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- Navigation Bar -->
<nav>
    <!-- Fragment identifiers (#) link to sections in same page -->
    <a href="#home">Home</a> |
    <a href="#about">About</a> |
    <a href="#services">Services</a> |
    <a href="#contact">Contact</a>
</nav>

<!-- Sections -->
<section id="home">
    <h2>Home</h2>
    <p>Welcome to our website</p>
</section>

<section id="about">
    <h2>About</h2>
    <p>About us content</p>
</section>

<section id="services">
    <h2>Services</h2>
    <p>Our services</p>
</section>

<section id="contact">
    <h2>Contact</h2>
    <p>Contact details</p>
</section>
</body>
</html>
