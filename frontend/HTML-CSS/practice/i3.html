<!--

Build a card layout where 3 cards sit side by side and wrap to the next row on smaller screens. 
-->

<!DOCTYPE html>
<html>
<head>
<style>
.container {
  display: flex;
  flex-wrap: wrap;
  gap: 20px;
}

.card {
  flex: 1 1 calc(33.33% - 20px);
  background: lightblue;
  padding: 20px;
  text-align: center;
}

/* Responsive */
@media (max-width: 768px) {
  .card {
    flex: 1 1 100%;
  }
}
</style>
</head>
<body>

<div class="container">
  <div class="card">Card 1</div>
  <div class="card">Card 2</div>
  <div class="card">Card 3</div>
</div>

</body>
</html>
