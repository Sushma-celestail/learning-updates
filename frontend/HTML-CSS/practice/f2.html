<!--2. SEO-Optimized <head> Section-->
    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
    </head>
    <body>
        <head>
  <!-- Basic Meta -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Awesome Website</title>
  <meta name="description" content="Learn web development, machine learning, and build amazing projects with us.">

  <!-- Open Graph (for social sharing) -->
  <meta property="og:title" content="My Awesome Website">
  <meta property="og:description" content="Learn web development, machine learning, and build amazing projects.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://www.mywebsite.com">
  <meta property="og:image" content="https://www.mywebsite.com/preview.jpg">

  <!-- Optional Extras -->
  <meta name="author" content="Your Name">
  <meta name="robots" content="index, follow">
</head>
    </body>
    </html>
