<!-- Pricing Table (3 equal-height columns) -->
 <!DOCTYPE html>
<html>
<head>
<style>
.container {
    display: flex;
    gap: 20px;
    padding: 20px;
}

.plan {
    flex: 1;
    background: #f4f4f4;
    padding: 20px;
    border-radius: 10px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
}

button {
    margin-top: auto;
    padding: 10px;
    background: teal;
    color: white;
    border: none;
}
</style>
</head>
<body>

<div class="container">
    <div class="plan">
        <h2>Basic</h2>
        <p>₹199/month</p>
        <p>Features...</p>
        <button>Buy</button>
    </div>

    <div class="plan">
        <h2>Standard</h2>
        <p>₹399/month</p>
        <p>More Features...</p>
        <button>Buy</button>
    </div>

    <div class="plan">
        <h2>Premium</h2>
        <p>₹599/month</p>
        <p>All Features...</p>
        <button>Buy</button>
    </div>
</div>

</body>
</html>
