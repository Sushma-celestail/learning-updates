<!-- Sticky Footer Layout (Flexbox magic) -->

<!DOCTYPE html>
<html>
<head>
<style>
body {
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    margin: 0;
}

header, footer {
    background: #333;
    color: white;
    padding: 15px;
    text-align: center;
}

main {
    flex: 1; /* Takes remaining space */
    padding: 20px;
}
</style>
</head>
<body>

<header>Header</header>

<main>
    Content goes here...
</main>

<footer>Footer</footer>

</body>
</html>
