<!DOCTYPE html>
<html>
<head>
<style>
.navbar {

    justify-content: space-between;
    align-items: center;

    padding: 12px;
    color: white;
}

.logo {
    font-size: 20px;
    font-weight: bold;
}

.nav-links {
    display: flex;
    gap: 20px;
}

.nav-links a {

    text-decoration: none;
}
</style>
</head>
<body>

<div class="navbar">
    <div class="logo">MyLogo</div>
    <div class="nav-links">
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
    </div>
</div>

</body>
</html>
