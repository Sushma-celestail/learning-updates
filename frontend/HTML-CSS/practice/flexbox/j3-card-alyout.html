<!-- Card Layout (3 cards + responsive wrap) -->
 <!DOCTYPE html>
<html>
<head>
<style>
.container {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
    padding: 20px;
}

.card {
    flex: 1 1 calc(33.33% - 20px);
    background: #eee;
    padding: 20px;
    border-radius: 10px;
}

/* Responsive */
@media (max-width: 768px) {
    .card {
        flex: 1 1 100%;
    }
@media(max-width: 609) {
    .card2{
        flex: 2,2,90%;    }
    
}
}
</style>
</head>
<body>

<div class="container">
    <div class="card">Card 1</div>
    <div class="card">Card 2</div>
    <div class="card">Card 3</div>
</div>

</body>
</html>
