<!-- Q9. Sticky Footer Layout 

Topics: Flexbox, min-height, flex-grow 

Problem Statement: 

Build a page layout with three sections: Header, Main Content, and Footer. The footer must always stick to the bottom of the viewport even when the main content is short (less than one viewport height). When content exceeds the viewport, the footer should be pushed below naturally. 

Constraints: 

Use min-height: 100vh on the body/wrapper with display: flex and flex-direction: column 

Main content must use flex-grow: 1 

Test with both short content (footer should be at bottom of viewport) and long content (footer should scroll below) 

Do NOT use position: fixed or position: absolute on the footer 

Header height: auto, Footer height: auto  -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sticky Footer Layout</title>

    <style>
        /*
        ==========================================
        STICKY FOOTER USING FLEXBOX
        ==========================================

        Goal:
        - Footer should stay at bottom if content is small
        - Footer should move down if content is large
        - No position: fixed or absolute
        */

        /* Apply full height and flex layout */
        body {
            margin: 0;

            /* Make body take full viewport height */
            min-height: 100vh;

            max-width: 100vw;

            /* Enable Flexbox */
            display: flex;

            /* Stack children vertically */
            flex-direction: column;
        }

        /*
        HEADER
        - Height is automatic based on content
        */
        header {
            background-color: lightblue;
            padding: 20px;
        }

        /*
        MAIN CONTENT
        - flex-grow: 1 is the MOST IMPORTANT part
        - It takes remaining space between header and footer
        */
        main {
            flex-grow: 1;   /* pushes footer to bottom */
            padding: 20px;
            background-color: #f5f5f5;
        }

        /*
        FOOTER
        - Height is automatic
        - Will stay at bottom when content is small
        - Will move down when content grows
        */
        footer {
            background-color: lightcoral;
            padding: 20px;
            text-align: center;
        }

        /*
        OPTIONAL: Just for visual spacing in demo
        */
        .long-content {
            margin-top: 20px;
        }

    </style>
</head>
<body>

    <!-- HEADER -->
    <header>
        <h1>My Website</h1>
        <p>This is the header section</p>
    </header>

    <!-- MAIN CONTENT -->
    <main>
        <h2>Main Content</h2>

        <!-- SHORT CONTENT (Test 1) -->
        <p>
            This is short content. Notice how the footer stays at the bottom
            of the screen even though there is very little content.
        </p>

        <!-- 
        LONG CONTENT (Test 2)
        Uncomment below to test scrolling behavior
        Footer will move down naturally
        -->

</body>
</html>
