[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os
template = alembic/script.py.mako

# Database URL — overridden by env.py using settings.database_url#
#sqlalchemy.url = postgresql://postgres:password@host:5432/postgres

sqlalchemy.url = postgresql://postgres:9x3K6mADrdQ0qjHy@localhost:5432/taskdb

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
